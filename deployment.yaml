apiVersion: apps/v1
kind: Deployment
metadata:
  name: abcd-ppp-deployment
  labels:
    app: abcd-ppp
spec:
  replicas: 2  # 무중단 배포 실습을 위해 서버 2대를 항상 유지합니다.
  selector:
    matchLabels:
      app: abcd-ppp
  template:
    metadata:
      labels:
        app: abcd-ppp
    spec:
      containers:
      - name: abcd-ppp-container
        image: my-app:v1  # 우리가 Minikube 도커 엔진에 빌드해 둔 바로 그 이미지 이름!
        imagePullPolicy: Never # 중요: 외부 도커 허브로 가지 말고 로컬 가상 세계에서 이미지를 찾으라는 옵션
        ports:
        - containerPort: 8080 # 스프링 부트가 사용하는 기본 포트